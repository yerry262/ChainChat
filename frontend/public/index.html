<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e40af" />
    <meta
      name="description"
      content="ChainChat - Decentralized messaging on Ethereum powered by XMTP. Connect your wallet and chat securely with end-to-end encryption."
    />
    <meta name="keywords" content="ethereum, chat, messaging, xmtp, web3, decentralized, blockchain, wallet, ens" />
    <meta property="og:title" content="ChainChat - Decentralized Messaging" />
    <meta property="og:description" content="Secure, decentralized messaging on Ethereum. Connect your wallet and chat with anyone on the XMTP network." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ChainChat - Decentralized Messaging" />
    <meta name="twitter:description" content="Secure, decentralized messaging on Ethereum powered by XMTP." />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>ChainChat - Decentralized Messaging</title>
    <style>
      /* Critical CSS for initial load */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading state */
      .loading-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 50%, #4338ca 100%);
      }
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run ChainChat.</noscript>
    <div id="root">
      <div class="loading-container">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </body>
</html>
